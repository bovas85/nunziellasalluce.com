---
# Disable ESLint and Stylelint engines in Codacy because:
# - ESLint: v3 uses @nuxt/eslint which requires generated .nuxt/eslint.config.mjs
# - Stylelint: v3 uses stylelint-config-recommended-vue which isn't available in
#   Codacy's Docker container (codacy/codacy-stylelint:2.13.70)
# Local linting works via pre-commit hooks with husky + lint-staged.
engines:
  eslint:
    enabled: false
  stylelint:
    enabled: false

exclude_paths:
  - "node_modules/**"
  - ".nuxt/**"
  - ".output/**"
  - "dist/**"
  - "v3/node_modules/**"
  - "v3/.nuxt/**"
  - "v3/.output/**"
